version: 2
updates:
  # Single NuGet update pass across both csproj directories. The
  # `directories:` (plural) form keeps shared deps like Newtonsoft.Json
  # in lockstep — bumping a transitive in the main project without the
  # matching bump in the test project causes NU1605 package-downgrade
  # errors during restore.
  - package-ecosystem: "nuget"
    directories:
      - "/VGMissionJournal"
      - "/VGMissionJournal.Tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Match the repo's conventional-commits style: "chore(deps): bump X from Y to Z".
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      bepinex:
        patterns:
          - "BepInEx.*"
    ignore:
      # Pinned to the game's Unity runtime — bumping would desync stubs.
      - dependency-name: "UnityEngine.Modules"
      # BepInEx 6 is a separate major branch with a different plugin API.
      # Stay on the 5.x stable line until there's a deliberate migration.
      - dependency-name: "BepInEx.Core"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
